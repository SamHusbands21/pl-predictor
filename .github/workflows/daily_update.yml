name: CI (disabled - pipeline runs locally)

# The full pipeline (Betfair odds, predictions, model training) runs on the
# local machine via run_daily.ps1 and run_retrain.ps1 so that:
#   - Betfair API works from a UK IP (no geo-restriction)
#   - Models are trained on a more powerful local machine
#   - No sklearn/Python version mismatches between CI and local
#
# This workflow exists only as a manual trigger for debugging.
# It does nothing by default.

on:
  workflow_dispatch:

jobs:
  placeholder:
    runs-on: ubuntu-latest
    steps:
      - name: No-op
        run: echo "Pipeline runs locally. See run_daily.ps1 and run_retrain.ps1."
